<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maxim</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <div class="screen">
      <div class="scroll" id="scroll">
        <section class="view on" data-view="home"     id="v-home"></section>
        <section class="view"    data-view="calendar" id="v-calendar"></section>
        <section class="view"    data-view="inbox"    id="v-inbox"></section>
        <section class="view"    data-view="items"    id="v-items"></section>
        <section class="view"    data-view="me"       id="v-me"></section>
      </div>

      <button class="fab" id="fab" aria-label="Capture">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>

      <div class="overlay" id="capture"></div>
      <div class="overlay" id="detail"></div>
      <div class="overlay" id="sortflow"></div>

      <nav class="tabbar" id="tabbar">
        <button class="tab on" data-view="home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg><span>Home</span></button>
        <button class="tab" data-view="calendar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M3 9h18M8 2v4M16 2v4"/></svg><span>Calendar</span></button>
        <button class="tab" data-view="inbox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 13l3-9h12l3 9M3 13v6a1 1 0 001 1h16a1 1 0 001-1v-6M3 13h5l2 3h4l2-3h5"/></svg><span>Inbox</span></button>
        <button class="tab" data-view="items"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg><span>Items</span></button>
        <button class="tab" data-view="me"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg><span>You</span></button>
      </nav>

      <div id="flash"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
