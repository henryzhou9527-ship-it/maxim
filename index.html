<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maxim</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="views.css" />
</head>
<body>
  <div class="app">
    <div class="screen">
      <div class="scroll" id="scroll">
        <section class="view on" data-view="home"     id="v-home"></section>
        <section class="view"    data-view="schedule" id="v-schedule"></section>
        <section class="view"    data-view="timeline" id="v-timeline"></section>
        <section class="view"    data-view="diary"    id="v-diary"></section>
        <section class="view"    data-view="items"    id="v-items"></section>
        <section class="view"    data-view="me"       id="v-me"></section>
      </div>

      <button class="fab" id="fab" aria-label="Add">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>

      <div class="overlay" id="capture"></div>
      <div class="overlay" id="detail"></div>
      <div class="overlay" id="sortflow"></div>
      <div class="overlay" id="blocksheet"></div>
      <div class="overlay" id="routinesheet"></div>
      <div class="overlay" id="diarycomposer"></div>
      <div class="overlay" id="diaryview"></div>

      <nav class="tabbar" id="tabbar">
        <button class="tab on" data-view="home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg><span>Home</span></button>
        <button class="tab" data-view="schedule"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><span>Schedule</span></button>
        <button class="tab" data-view="timeline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h11M3 12h16M3 18h8"/><circle cx="17" cy="6" r="1.5"/><circle cx="14" cy="18" r="1.5"/></svg><span>Timeline</span></button>
        <button class="tab" data-view="diary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h11l3 3v13H5zM8 4v16M11 9h5M11 13h5"/></svg><span>Diary</span></button>
        <button class="tab" data-view="items"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg><span>Items</span></button>
      </nav>

      <div id="flash"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="app-views.js"></script>
</body>
</html>
